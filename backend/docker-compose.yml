version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: airport_semey_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: airport_semey
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: airport_semey_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
